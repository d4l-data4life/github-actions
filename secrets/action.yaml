name: Seed Secrets
description: Create or update secrets in Azure Key Vault for a repository
inputs:
  project:
    description: Project key from config.json (for example sensorhub/airms/office-ber)
    default: sensorhub
  environment:
    description: Environment (dev/staging/prod)
    required: true
    default: dev
  azure-credentials:
    description: Credentials used to login to Azure
    required: true
  secret-1:
    description: >
      Generic secret slot 1. Pass a repository/environment secret via with: on the
      calling step, then reference it with from-input: secret-1 in the secrets YAML.
    required: false
    default: ''
  secret-2:
    description: >
      Generic secret slot 2. Pass a repository/environment secret via with: on the
      calling step, then reference it with from-input: secret-2 in the secrets YAML.
    required: false
    default: ''
  secret-3:
    description: >
      Generic secret slot 3. Pass a repository/environment secret via with: on the
      calling step, then reference it with from-input: secret-3 in the secrets YAML.
    required: false
    default: ''
  secret-4:
    description: >
      Generic secret slot 4. Pass a repository/environment secret via with: on the
      calling step, then reference it with from-input: secret-4 in the secrets YAML.
    required: false
    default: ''
  secret-5:
    description: >
      Generic secret slot 5. Pass a repository/environment secret via with: on the
      calling step, then reference it with from-input: secret-5 in the secrets YAML.
    required: false
    default: ''
  db-secrets:
    description: >
      When non-empty, create/update the database credential secret in Key Vault.
      Use 'auto' to generate credentials from the repo name and config with all defaults.
      Pass a YAML list of key/value pairs to override individual fields of the generated
      secret (e.g. DBName, DBSchema, Hostname, Port, username, password).
      Add '- overwrite: true' to regenerate the secret even if it already exists (default: false).
      Example:
        db-secrets: |
          - Port: 5433
          - DBSchema: myschema
          - overwrite: true
    required: false
    default: ''
  secrets:
    description: >
      YAML list of secrets to generate and store in Key Vault. Each item must have a type key.
      Supported types:
        rsa-key:
          length:      RSA key size in bits (optional, default: 2048)
          private-key: destination path for the private key
          public-key:  destination path for the public key
          overwrite:   regenerate even if the private key already exists (optional, default: false)
        password:
          length:      password length in characters (optional, default: 20)
          name:        destination path for the password value
          overwrite:   regenerate even if the key already exists (optional, default: false)
        random:
          length:      number of random bytes to generate (optional, default: 32)
          encoding:    output encoding — 'hex' or 'base64' (optional, default: hex)
          name:        destination path for the encoded value
          overwrite:   regenerate even if the key already exists (optional, default: false)
        preset:
          from-input:  preferred — one of the generic slot names (secret-1 … secret-5).
                       Pass the secret value via with: secrets.MY_SECRET on the calling
                       step and reference the same slot here. GitHub masks action inputs
                       that originate from repository/environment secrets; using env: on
                       the calling step instead is logged in plaintext on every composite
                       sub-step before any script runs.
          from-env:    legacy — explicit env var name already present in the environment.
                       Do not inject it via env: on the calling uses: step.
          name:        destination path for the value
          overwrite:   replace the key if it already exists (optional, default: false).
                       If the value is empty the preset is always skipped regardless of overwrite.
          Example:
            secrets: |
              - preset: true
                from-input: secret-1
                name: common/FIREBASE_CREDENTIALS
            secret-1: (secrets.FIREBASE_CREDENTIALS)
        delete-secret:
          name: destination path of a single JSON key to remove from a KV
                secret (e.g. 'namespace/OLD_KEY' or just 'OLD_KEY' for repo
                namespace). No-op if the key doesn't exist. Intended for
                migrations and cleanup.
        mtls-ca:
          length:    RSA key size in bits for the CA (optional, default: 4096)
          days:      validity in days (optional, default: 3650)
          subject:   X.509 subject string, e.g. "/C=DE/ST=BB/O=D4L/CN=My Root CA"
          ca-key:    destination path for the CA private key. MUST NOT be under
                     'common/' (which is broadcast to every service by deploy).
                     Omit the prefix to use the repo namespace (default).
          ca-cert:   destination path for the CA certificate
          overwrite: regenerate even if the CA already exists (optional, default: false)
        mtls-cert:
          role:         'client' (default), 'server', or 'distribute-ca'
                        - client/server issue a leaf cert with extendedKeyUsage
                        - distribute-ca copies an existing CA cert into cert-out
          length:       RSA key size for the leaf (optional, default: 4096)
          days:         validity in days (optional, default: 500)
          subject:      X.509 subject string (required for client/server)
          san:          subjectAltName, e.g. "DNS:my-svc,IP:10.0.0.1" (optional)
          ca-key-from:  path of the CA private key in Key Vault (required for client/server)
          ca-cert-from: path of the CA cert in Key Vault (always required)
          cert-out:     destination path for the leaf cert (or the CA cert
                        when role: distribute-ca)
          key-out:      destination path for the leaf private key (client/server only)
          ca-cert-out:  optional extra destination to also write the CA cert to
                        (handy for shipping the CA into a consumer's namespace)
          overwrite:    regenerate even if the leaf already exists (optional, default: false)
      Paths are in the form "[namespace/]KEY_NAME". The namespace maps to the Key Vault
      secret "{environment}--{namespace}". Without a namespace the secret defaults to
      "{environment}--{repo_name}". The KEY_NAME is the JSON key within that secret.
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Mask preset secret slots
      shell: bash
      env:
        S1: ${{ inputs.secret-1 }}
        S2: ${{ inputs.secret-2 }}
        S3: ${{ inputs.secret-3 }}
        S4: ${{ inputs.secret-4 }}
        S5: ${{ inputs.secret-5 }}
      run: |
        for v in "$S1" "$S2" "$S3" "$S4" "$S5"; do
          if [ -n "$v" ]; then echo "::add-mask::$v"; fi
        done

    - name: Azure CLI login
      uses: azure/login@v2
      with:
        creds: ${{ inputs.azure-credentials }}

    - name: Set environment variables
      shell: bash
      run: |
        ORG_AND_REPO=${{ github.repository }}
        echo "REPO_NAME=${ORG_AND_REPO##*/}" >> $GITHUB_ENV

        PROJECT="${{ inputs.project }}"
        ENV="${{ inputs.environment }}"
        ENV_UPPER=$(echo "$ENV" | tr '[:lower:]' '[:upper:]')

        CONFIG_PATH="${{ github.action_path }}/../config.json"

        if ! jq -e --arg project "$PROJECT" '.[$project] != null' "$CONFIG_PATH" >/dev/null; then
          echo "::error::Project '$PROJECT' not found in config.json"
          exit 1
        fi

        HAS_ENVIRONMENTS=$(jq -r --arg project "$PROJECT" '.[$project] | has("environments")' "$CONFIG_PATH")

        if [ "$HAS_ENVIRONMENTS" == "true" ]; then
          ENV_CONFIG=$(jq -r --arg project "$PROJECT" --arg env "$ENV" \
            '.[$project].environments[$env] // .[$project].environments.default' "$CONFIG_PATH")
          echo "$ENV_CONFIG" | jq -r --arg env "$ENV" --arg env_upper "$ENV_UPPER" \
            'to_entries[] | "\(.key | ascii_upcase)=\(.value | gsub("{environment}"; $env) | gsub("{ENVIRONMENT}"; $env_upper))"' \
            | tee -a $GITHUB_ENV
          jq -r --arg project "$PROJECT" --arg env "$ENV" --arg env_upper "$ENV_UPPER" \
            '.[$project] | to_entries | map(select(.key != "environments")) | .[] | "\(.key | ascii_upcase)=\(.value | gsub("{environment}"; $env) | gsub("{ENVIRONMENT}"; $env_upper))"' \
            "$CONFIG_PATH" | tee -a $GITHUB_ENV
        else
          jq -r --arg project "$PROJECT" --arg env "$ENV" --arg env_upper "$ENV_UPPER" \
            '.[$project] | to_entries[] | "\(.key | ascii_upcase)=\(.value | gsub("{environment}"; $env) | gsub("{ENVIRONMENT}"; $env_upper))"' \
            "$CONFIG_PATH" | tee -a $GITHUB_ENV
        fi

    - name: Seed database secret
      if: ${{ inputs.db-secrets != '' }}
      shell: bash
      env:
        DB_SECRETS_INPUT: ${{ inputs.db-secrets }}
      run: |
        set -euo pipefail

        SECRET_NAME="${{ inputs.environment }}--db--${{ env.REPO_NAME }}"
        KV_NAME="${{ env.KEY_VAULT_NAME }}"
        REPO_NAME="${{ env.REPO_NAME }}"
        HOSTNAME="${{ env.POSTGRES_HOSTNAME }}"

        if [ -z "$HOSTNAME" ]; then
          echo "::error::POSTGRES_HOSTNAME is not set for project '${{ inputs.project }}' / environment '${{ inputs.environment }}'. Check config.json."
          exit 1
        fi

        PASSWORD=''
        while [ ${#PASSWORD} -lt 24 ]; do
          PASSWORD=$(openssl rand -base64 48 | tr -dc 'A-Za-z0-9' | head -c 24 || true)
        done
        echo "::add-mask::$PASSWORD"

        SECRET_VALUE=$(jq -cn \
          --arg dbname   "$REPO_NAME" \
          --arg hostname "$HOSTNAME"  \
          --arg username "$REPO_NAME" \
          --arg password "$PASSWORD"  \
          '{
            DBName:   $dbname,
            DBSchema: "public",
            Hostname: $hostname,
            Port:     "5432",
            username: $username,
            password: $password
          }')

        # If db-secrets is a YAML list, extract the overwrite flag and field overrides.
        OVERWRITE='false'
        OVERRIDES='{}'
        if [ "$DB_SECRETS_INPUT" != "auto" ]; then
          if echo "$DB_SECRETS_INPUT" | grep -qE '(^|[[:space:]])overwrite:[[:space:]]*true'; then
            OVERWRITE='true'
          else
            OVERWRITE=$(echo "$DB_SECRETS_INPUT" | \
              yq '[.[] | select(has("overwrite"))] | .[0].overwrite // false' \
              2>/dev/null || echo 'false')
          fi
          # Field overrides are all items except the overwrite flag.
          # Non-string values (e.g. integer Port: 1234) are coerced to strings to match the schema.
          OVERRIDES=$(echo "$DB_SECRETS_INPUT" | \
            yq -o=json '[.[] | select(has("overwrite") | not)]' 2>/dev/null \
            | jq 'if type == "array" then (add // {}) else {} end' 2>/dev/null || echo '{}')
        fi

        # Skip if the secret already exists and overwrite is not requested.
        EXISTING=$(az keyvault secret show \
          --vault-name "$KV_NAME" --name "$SECRET_NAME" \
          --query 'value' -o tsv 2>/dev/null || echo '')
        if [ -n "$EXISTING" ] && [ "$OVERWRITE" != "true" ]; then
          echo "::notice::Secret '$SECRET_NAME' already exists — skipping. Add '- overwrite: true' to db-secrets to regenerate."
          exit 0
        fi

        if [ "$OVERRIDES" != '{}' ] && [ "$OVERRIDES" != 'null' ]; then
          SECRET_VALUE=$(echo "$SECRET_VALUE" | jq \
            --argjson overrides "$OVERRIDES" \
            '. + ($overrides | with_entries(.value |= if type == "string" then . else tostring end))')
        fi

        az keyvault secret set \
          --vault-name "$KV_NAME" \
          --name       "$SECRET_NAME" \
          --value      "$SECRET_VALUE" \
          --output none

        echo "::notice::Secret '$SECRET_NAME' successfully written to Key Vault '$KV_NAME'."

    - name: Seed secrets
      if: ${{ inputs.secrets != '' }}
      shell: bash
      env:
        SECRETS_INPUT: ${{ inputs.secrets }}
        ENV: ${{ inputs.environment }}
        REPO_NAME: ${{ env.REPO_NAME }}
        KV_NAME: ${{ env.KEY_VAULT_NAME }}
        INPUT_SECRET_1: ${{ inputs.secret-1 }}
        INPUT_SECRET_2: ${{ inputs.secret-2 }}
        INPUT_SECRET_3: ${{ inputs.secret-3 }}
        INPUT_SECRET_4: ${{ inputs.secret-4 }}
        INPUT_SECRET_5: ${{ inputs.secret-5 }}
      run: ${{ github.action_path }}/seed-secrets.sh
